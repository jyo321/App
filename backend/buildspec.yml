version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1

phases:
  install:
    commands:
      - echo Installing tools
      - yum install -y jq

  pre_build:
    commands:
      - echo "Selected environment: $ENV"

      # Load environment variables
      - if [ "$ENV" = "dev" ]; then
          echo "Loading DEV env";
          source env/dev.env;
        else
          echo "Loading QA env";
          source env/qa.env;
        fi

      # Debug
      - echo "ECR_REPOSITORY=$ECR_REPOSITORY"
      - echo "ECS_CLUSTER=$ECS_CLUSTER"
      - echo "ECS_SERVICE=$ECS_SERVICE"
      - echo "CONTAINER_NAME=$CONTAINER_NAME"

      # Login to ECR
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URI=$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPOSITORY
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - echo Logging in to ECR
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_URI

  build:
    commands:
      - echo Building Docker image
      - cd backend
      - npm install
      - docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
      - docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_URI:$IMAGE_TAG
      - docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_URI:latest

  post_build:
    commands:
      - echo Pushing Docker image
      - docker push $ECR_URI:$IMAGE_TAG
      - docker push $ECR_URI:latest

      # Generate valid imagedefinitions.json in the root
      - |
        echo "Creating imagedefinitions.json"
        echo "[{\"name\":\"$CONTAINER_NAME\",\"imageUri\":\"$ECR_URI:$IMAGE_TAG\"}]" > imagedefinitions.json
        echo "Contents:"
        cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json